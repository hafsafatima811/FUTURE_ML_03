<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compare | AI Resume Screening System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --primary: #6366f1; --success: #10b981; --warning: #f59e0b; --danger: #ef4444;
            --dark: #1e293b; --gray: #64748b; --light: #f8fafc; --white: #ffffff;
            --shadow: 0 4px 6px -1px rgba(0,0,0,0.1); --shadow-lg: 0 20px 25px -5px rgba(0,0,0,0.1);
            --radius: 12px; --radius-lg: 16px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #f1f5f9; min-height: 100vh; color: var(--dark); }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }

        .page-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 30px; border-radius: var(--radius-lg); color: white; margin-bottom: 24px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .page-header h1 { font-size: 1.8rem; font-weight: 800; }
        .page-header p { opacity: 0.9; margin-top: 5px; }

        .btn {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 10px 20px; border: none; border-radius: 8px;
            font-family: inherit; font-size: 0.9rem; font-weight: 600;
            cursor: pointer; transition: all 0.2s; text-decoration: none;
        }
        .btn-light { background: white; color: var(--primary); }
        .btn-outline { background: rgba(255,255,255,0.2); color: white; border: 1px solid rgba(255,255,255,0.3); }

        .card {
            background: var(--white); border-radius: var(--radius-lg); padding: 24px;
            box-shadow: var(--shadow); margin-bottom: 20px;
        }
        .card-title {
            font-size: 1.1rem; font-weight: 700; margin-bottom: 16px;
            display: flex; align-items: center; gap: 10px;
        }
        .card-title i { color: var(--primary); }

        .comparison-grid {
            display: grid;
            grid-template-columns: 200px repeat(auto-fit, minmax(250px, 1fr));
            gap: 1px;
            background: #e2e8f0;
            border-radius: var(--radius);
            overflow: hidden;
        }
        .comparison-grid > div {
            background: white;
            padding: 16px;
        }
        .grid-header {
            font-weight: 700;
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%) !important;
            color: white;
        }
        .grid-label {
            font-weight: 600;
            color: var(--gray);
            background: #f8fafc !important;
            font-size: 0.9rem;
        }

        .score-pill {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.85rem;
        }
        .pill-excellent { background: #d1fae5; color: #065f46; }
        .pill-good { background: #fef3c7; color: #92400e; }
        .pill-average { background: #fee2e2; color: #991b1b; }

        .skill-mini {
            display: inline-block;
            padding: 2px 8px;
            background: #e0e7ff;
            color: var(--primary);
            border-radius: 12px;
            font-size: 0.75rem;
            margin: 2px;
        }

        .empty-state {
            text-align: center; padding: 60px 20px;
        }
        .empty-state i { font-size: 4rem; color: #cbd5e1; margin-bottom: 20px; }
        .empty-state h3 { font-size: 1.3rem; color: var(--gray); margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="page-header">
            <div>
                <h1><i class="fas fa-balance-scale"></i> Candidate Comparison</h1>
                <p>Side-by-side comparison of multiple candidates</p>
            </div>
            <div style="display:flex; gap:12px;">
                <a href="/history" class="btn btn-outline"><i class="fas fa-history"></i> History</a>
                <a href="/results" class="btn btn-outline"><i class="fas fa-arrow-left"></i> Results</a>
                <a href="/" class="btn btn-light"><i class="fas fa-home"></i> Dashboard</a>
            </div>
        </div>

        <div id="comparisonContent">
            <div class="empty-state">
                <i class="fas fa-users"></i>
                <h3>No candidates to compare</h3>
                <p>Process resumes first to enable comparison.</p>
                <a href="/" class="btn btn-light" style="margin-top:16px;"><i class="fas fa-arrow-left"></i> Start Analysis</a>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const stored = sessionStorage.getItem('screeningResults');
            if (stored) {
                const data = JSON.parse(stored);
                if (data.candidates && data.candidates.length > 1) {
                    renderComparison(data.candidates);
                }
            }
        });

        function renderComparison(candidates) {
            candidates.sort((a, b) => b.match_result.total_score - a.match_result.total_score);
            const topCandidates = candidates.slice(0, 4);

            const container = document.getElementById('comparisonContent');

            let html = `
                <div class="card">
                    <div class="card-title"><i class="fas fa-table"></i> Detailed Comparison</div>
                    <div class="comparison-grid">
                        <div class="grid-header">Metric</div>
                        ${topCandidates.map(c => `
                            <div class="grid-header" style="text-align:center;">
                                <div>${c.file_name}</div>
                                <div style="font-size:0.8rem; opacity:0.8; margin-top:4px;">Rank #${candidates.indexOf(c) + 1}</div>
                            </div>
                        `).join('')}

                        <div class="grid-label">Overall Score</div>
                        ${topCandidates.map(c => {
                            const score = c.match_result.total_score;
                            const cls = score >= 70 ? 'excellent' : score >= 50 ? 'good' : 'average';
                            return `<div style="text-align:center;"><span class="score-pill pill-${cls}">${score.toFixed(1)}%</span></div>`;
                        }).join('')}

                        <div class="grid-label">Match Level</div>
                        ${topCandidates.map(c => `<div style="text-align:center; font-weight:600;">${c.match_result.match_level}</div>`).join('')}

                        <div class="grid-label">Skills Match</div>
                        ${topCandidates.map(c => `<div style="text-align:center;">${c.match_result.breakdown.skills_match.toFixed(1)}%</div>`).join('')}

                        <div class="grid-label">Experience Match</div>
                        ${topCandidates.map(c => `<div style="text-align:center;">${c.match_result.breakdown.experience_match.toFixed(1)}%</div>`).join('')}

                        <div class="grid-label">Education Match</div>
                        ${topCandidates.map(c => `<div style="text-align:center;">${c.match_result.breakdown.education_match.toFixed(1)}%</div>`).join('')}

                        <div class="grid-label">Semantic Similarity</div>
                        ${topCandidates.map(c => `<div style="text-align:center;">${c.match_result.breakdown.semantic_similarity.toFixed(1)}%</div>`).join('')}

                        <div class="grid-label">Resume Quality</div>
                        ${topCandidates.map(c => `<div style="text-align:center;">${c.match_result.breakdown.resume_quality.toFixed(1)}%</div>`).join('')}

                        <div class="grid-label">Total Skills</div>
                        ${topCandidates.map(c => `<div style="text-align:center; font-weight:700;">${c.skills.skill_count}</div>`).join('')}

                        <div class="grid-label">Experience (Years)</div>
                        ${topCandidates.map(c => `<div style="text-align:center;">${c.experience.total_years || 'N/A'}</div>`).join('')}

                        <div class="grid-label">Education</div>
                        ${topCandidates.map(c => `<div style="text-align:center; text-transform:capitalize;">${c.education.highest_degree}</div>`).join('')}

                        <div class="grid-label">Quality Score</div>
                        ${topCandidates.map(c => `<div style="text-align:center;">${c.quality_analysis.overall_score}/100</div>`).join('')}

                        <div class="grid-label">ATS Score</div>
                        ${topCandidates.map(c => `<div style="text-align:center;">${c.quality_analysis.ats_score}/100</div>`).join('')}

                        <div class="grid-label">Top Skills</div>
                        ${topCandidates.map(c => `
                            <div style="text-align:center;">
                                ${c.skills.top_skills.slice(0, 5).map(([skill]) => `<span class="skill-mini">${skill}</span>`).join('')}
                            </div>
                        `).join('')}

                        <div class="grid-label">Skill Gaps</div>
                        ${topCandidates.map(c => `<div style="text-align:center; color:var(--danger);">${c.match_result.skill_gaps.length} gaps</div>`).join('')}

                        <div class="grid-label">Recommendation</div>
                        ${topCandidates.map(c => `<div style="text-align:center; font-size:0.85rem;">${c.match_result.recommendation}</div>`).join('')}
                    </div>
                </div>
            `;

            container.innerHTML = html;
        }
    </script>
</body>
</html>
